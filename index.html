<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-elevated: #111111;
      --border: rgba(255,255,255,0.06);
      --emerald: #10b981;
      --emerald-light: #34d399;
      --emerald-dark: #059669;
      --amber: #f59e0b;
      --amber-light: #fbbf24;
      --text: #ffffff;
      --text-dim: #555555;
      --text-muted: #888888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 380px;
      height: 520px;
      overflow: hidden;
      position: relative;
    }

    /* Aurora Background */
    .aurora {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 60% at 20% -10%, rgba(16,185,129,0.18), transparent),
        radial-gradient(ellipse 80% 50% at 80% 5%, rgba(16,185,129,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(245,158,11,0.08), transparent);
      pointer-events: none;
      z-index: 0;
      animation: auroraShift 10s ease-in-out infinite alternate;
    }

    @keyframes auroraShift {
      0% { opacity: 0.7; transform: scale(1) translateY(0); }
      100% { opacity: 1; transform: scale(1.05) translateY(-3px); }
    }

    /* Noise Texture */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 1;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(16,185,129,0.3);
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }

    .brand-sub {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.15);
      border-radius: 20px;
    }

    .live-dot {
      width: 5px;
      height: 5px;
      background: var(--emerald);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { opacity: 0.7; transform: scale(0.85); box-shadow: 0 0 0 4px rgba(16,185,129,0); }
    }

    .live-text {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--emerald-light);
    }

    /* Cards Container */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    /* Metric Card */
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .metric-card:hover {
      transform: translateY(-2px);
    }

    .metric-card.today {
      border-color: rgba(16,185,129,0.2);
      box-shadow: 0 4px 20px rgba(16,185,129,0.08);
    }

    .metric-card.today::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--emerald), var(--emerald-light));
      border-radius: 20px 20px 0 0;
    }

    .metric-card.month {
      border-color: rgba(245,158,11,0.2);
      box-shadow: 0 4px 20px rgba(245,158,11,0.08);
    }

    .metric-card.month::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
      border-radius: 20px 20px 0 0;
    }

    .card-glow {
      position: absolute;
      top: -20px;
      right: -20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.15;
      pointer-events: none;
    }

    .metric-card.today .card-glow {
      background: var(--emerald);
    }

    .metric-card.month .card-glow {
      background: var(--amber);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .card-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metric-card.today .card-icon {
      background: rgba(16,185,129,0.15);
    }

    .metric-card.month .card-icon {
      background: rgba(245,158,11,0.15);
    }

    .card-icon svg {
      width: 10px;
      height: 10px;
    }

    .metric-card.today .card-icon svg {
      stroke: var(--emerald-light);
      fill: none;
      stroke-width: 2.5;
    }

    .metric-card.month .card-icon svg {
      stroke: var(--amber-light);
      fill: none;
      stroke-width: 2.5;
    }

    .card-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-value {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
      position: relative;
    }

    .metric-card.today .card-value {
      background: linear-gradient(135deg, #a7f3d0 0%, var(--emerald-light) 50%, var(--emerald) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .metric-card.month .card-value {
      background: linear-gradient(135deg, #fde68a 0%, var(--amber-light) 50%, var(--amber) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-suffix {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    .card-progress {
      margin-top: auto;
      padding-top: 12px;
    }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
      position: relative;
    }

    .metric-card.today .progress-fill {
      background: linear-gradient(90deg, var(--emerald), var(--emerald-light));
    }

    .metric-card.month .progress-fill {
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -1px;
      bottom: -1px;
      width: 5px;
      border-radius: 50%;
    }

    .metric-card.today .progress-fill::after {
      background: var(--emerald-light);
      box-shadow: 0 0 6px var(--emerald);
    }

    .metric-card.month .progress-fill::after {
      background: var(--amber-light);
      box-shadow: 0 0 6px var(--amber);
    }

    .progress-text {
      font-size: 8px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Rate Card */
    .rate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rate-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rate-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rate-icon svg {
      width: 12px;
      height: 12px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
    }

    .rate-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .rate-label {
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .rate-value {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .rate-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .time-display {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .settings-btn {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .settings-btn:hover {
      background: var(--emerald);
      border-color: var(--emerald);
      transform: rotate(90deg);
    }

    .settings-btn svg {
      width: 13px;
      height: 13px;
      stroke: rgba(255,255,255,0.4);
      fill: none;
      stroke-width: 2;
      transition: stroke 0.3s;
    }

    .settings-btn:hover svg {
      stroke: white;
    }

    /* Float Digits */
    .float-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 50;
    }

    .float-digit {
      position: absolute;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--emerald-light);
      opacity: 0;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 0 0 10px rgba(16,185,129,0.5);
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      20% { opacity: 1; transform: translateY(-8px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      width: 300px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .modal-close {
      width: 26px;
      height: 26px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.1);
    }

    .modal-close svg {
      width: 11px;
      height: 11px;
      stroke: rgba(255,255,255,0.5);
      fill: none;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      padding: 11px 13px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      transition: all 0.2s;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--emerald);
      background: rgba(16,185,129,0.05);
    }

    .field-input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 6px;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16,185,129,0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .metric-card {
      animation: cardIn 0.5s ease forwards;
    }

    .metric-card:nth-child(1) { animation-delay: 0.1s; }
    .metric-card:nth-child(2) { animation-delay: 0.2s; }
    .rate-card { animation: cardIn 0.5s ease forwards; animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="noise"></div>

  <div class="float-container" id="floatContainer"></div>

  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">SALARY</span>
          <span class="brand-sub">Dashboard</span>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
      </div>
    </div>

    <!-- Metric Cards -->
    <div class="cards">
      <!-- Today's Card -->
      <div class="metric-card today">
        <div class="card-glow"></div>
        <div class="card-header">
          <div class="card-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <span class="card-label">今日收入</span>
        </div>
        <div class="card-value" id="todayValue">¥0.00</div>
        <div class="card-suffix">元</div>
        <div class="card-progress">
          <div class="progress-bar">
            <div class="progress-fill" id="todayProgress" style="width: 0%"></div>
          </div>
          <div class="progress-text" id="todayProgressText">已过 0%</div>
        </div>
      </div>

      <!-- Month's Card -->
      <div class="metric-card month">
        <div class="card-glow"></div>
        <div class="card-header">
          <div class="card-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <span class="card-label">本月收入</span>
        </div>
        <div class="card-value" id="monthValue">¥0.00</div>
        <div class="card-suffix">元</div>
        <div class="card-progress">
          <div class="progress-bar">
            <div class="progress-fill" id="monthProgress" style="width: 0%"></div>
          </div>
          <div class="progress-text" id="monthProgressText">已过 0%</div>
        </div>
      </div>
    </div>

    <!-- Rate Card -->
    <div class="rate-card">
      <div class="rate-item">
        <div class="rate-icon">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="rate-text">
          <span class="rate-label">每秒收益</span>
          <span class="rate-value" id="perSecond">¥0.00</span>
        </div>
      </div>
      <div class="rate-divider"></div>
      <div class="rate-item">
        <div class="rate-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="rate-text">
          <span class="rate-label">每小时收益</span>
          <span class="rate-value" id="perHour">¥0.00</span>
        </div>
      </div>
      <div class="rate-divider"></div>
      <div class="rate-item">
        <div class="rate-icon">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="rate-text">
          <span class="rate-label">每天收益</span>
          <span class="rate-value" id="perDay">¥0.00</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="time-display" id="timeDisplay"></div>
      <button class="settings-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">设置</h2>
        <button class="modal-close" id="closeModal">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="field">
        <label class="field-label">月薪 (¥)</label>
        <input type="number" class="field-input" id="salary" placeholder="8000">
      </div>
      <div class="field">
        <label class="field-label">每月工作天数</label>
        <input type="number" class="field-input" id="days" placeholder="22">
      </div>
      <div class="field">
        <label class="field-label">每天工时</label>
        <input type="number" class="field-input" id="hours" placeholder="8">
      </div>
      <button class="save-btn" id="saveBtn">保存</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
